<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery - Shrimpy's Backwoods Workshop</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

<style>
html{scroll-padding-top:150px;scroll-behavior:smooth;margin:0;padding:0;overflow-x:hidden;}
body{font-family:'Merriweather',serif;margin:0;padding-top:150px;background:url('background.png') no-repeat center center fixed;background-size:cover;color:#333;}
header{background:rgba(255,255,255,.95);position:fixed;top:0;width:100%;z-index:1000;padding:.5rem 1rem;display:flex;flex-direction:column;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,.1);text-align:center;}
.site-title{font-size:2rem;font-weight:700;color:#5a3e1b;margin:.5rem 0 0 0;}
.site-subtitle{font-size:1rem;font-weight:500;color:#5a3e1b;margin:0;}
.menu-toggle{display:none;font-size:1.8rem;background:none;border:none;color:#5a3e1b;cursor:pointer;margin-top:.5rem;}
nav.top-nav{display:flex;gap:.75rem;margin-top:.5rem;flex-wrap:wrap;justify-content:center;}
nav.top-nav a{text-decoration:none;color:#5a3e1b;font-weight:600;}
nav.top-nav a:hover{color:#a97c50;}
nav.top-nav a.active{color:#a97c50;text-decoration:underline;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;max-width:1100px;margin:2rem auto;padding:1rem;}
.gallery-card{background:rgba(255,255,255,.9);border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.1);cursor:pointer;transition:.25s;text-align:center;}
.gallery-card:hover{transform:scale(1.05);}
.gallery-card img{width:100%;border-radius:8px 8px 0 0;}
.gallery-card h2{padding:1rem;color:#5a3e1b;}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);justify-content:center;align-items:center;z-index:2000;}
#lightbox img{max-width:90%;max-height:85%;border-radius:8px;}
.lb-prev,.lb-next,.lb-close{position:absolute;background:none;border:none;color:white;font-size:2rem;cursor:pointer;}
.lb-prev{left:30px;}
.lb-next{right:30px;}
.lb-close{top:20px;right:30px;}
footer{text-align:center;padding:1rem;font-size:.9rem;color:#5a3e1b;}
@media(max-width:768px){.menu-toggle{display:block;}nav.top-nav{display:none;flex-direction:column;position:absolute;top:100%;left:0;width:100%;background:rgba(255,255,255,.95);padding:1rem;}nav.top-nav.show{display:flex;}}
</style>
</head>

<body>

<header>
<h1 class="site-title">Shrimpy's Backwoods Workshop</h1>
<p class="site-subtitle">Grain. Grit. Craftsmanship.</p>

<button class="menu-toggle">&#9776;</button>

<nav class="top-nav">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="gallery.html" class="active">Gallery</a>
<a href="shop.html">Shop</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="gallery-grid">

<div class="gallery-card" onclick="openGallery('coasters')">
<img src="images/live edgewood 3.jpg" loading="lazy">
<h2>Coasters</h2>
</div>

<div class="gallery-card" onclick="openGallery('signs')">
<img src="images/Deluca sign 1.JPG" loading="lazy">
<h2>Signs</h2>
</div>

<div class="gallery-card" onclick="openGallery('prints')">
<img src="images/spiral tree.jpg" loading="lazy">
<h2>3D Prints</h2>
</div>

<div class="gallery-card" onclick="openGallery('chair')">
<img src="images/chair 1.jpeg" loading="lazy">
<h2>Portable Lounge Chair</h2>
</div>

<div class="gallery-card" onclick="openGallery('recliningChair')">
<img src="images/chair_front.jpg" loading="lazy">
<h2>Reclining Adirondack Chair</h2>
</div>

<div class="gallery-card" onclick="openGallery('table')">
<img src="images/bench_table1.JPG" loading="lazy">
<h2>Table</h2>
</div>

<div class="gallery-card" onclick="openGallery('rocker')">
<img src="images/rocker_iso.jpg" loading="lazy">
<h2>Rocking Chair</h2>
</div>

<div class="gallery-card" onclick="openGallery('birdhouse')">
<img src="images/bird house_iso.jpg" loading="lazy">
<h2>Triple Decker Lighthouse Birdhouse</h2>
</div>

<div class="gallery-card" onclick="openGallery('box')">
<img src="images/box_iso.jpg" loading="lazy">
<h2>Customized Box</h2>
</div>

</section>

<div id="lightbox">
<button class="lb-close" onclick="closeGallery()">✕</button>
<button class="lb-prev" onclick="prevImage()">❮</button>
<img id="lightbox-img">
<button class="lb-next" onclick="nextImage()">❯</button>
</div>

<footer>
© Shrimpy's Backwoods Workshop
</footer>

<script>

  document.querySelector("nav.top-nav").classList.toggle("show")
})

    "images/xmas 1.jpg","images/xmas 2.jpg","images/xmas 3.jpg","images/xmas 4.jpg","images/xmas 5.jpg","images/xmas 6.jpg","images/xmas 7.jpg","images/xmas 8.jpg","images/xmas 9.jpg",

    "images/wolf 1.JPG","images/wolf 2.JPG","images/wolf 3.JPG","images/wolf 4.JPG","images/wolf 5.JPG","images/wolf 6.JPG","images/wolf 7.JPG","images/wolf 8.JPG",

    "images/charlie_1.JPG","images/charlie_2.JPG",

  ],

  ],

  ],
  birdhouse:[

  ],
  box:[
    "images/box_iso.jpg","images/box_top.jpg"
  ]
};

let currentGallery = [];
let currentIndex = 0;

function openGallery(name){
  if(!galleries[name]) return;
  currentGallery = galleries[name];
  currentIndex = 0;
  document.getElementById("lightbox").style.display="flex";
  showImage();
}

function closeGallery(){
  document.getElementById("lightbox").style.display="none";
}

function showImage(){
  document.getElementById("lightbox-img").src = currentGallery[currentIndex];
}

function nextImage(){
  currentIndex = (currentIndex + 1) % currentGallery.length;
  showImage();
}

function prevImage(){
  currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
  showImage();
}

document.addEventListener("keydown", e => {
  if(document.getElementById("lightbox").style.display === "flex"){
    if(e.key === "ArrowRight") nextImage();
    if(e.key === "ArrowLeft") prevImage();
    if(e.key === "Escape") closeGallery();
  }
});
</script>

</body>
</html>
